name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Lint and format
        run: bun run check
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Build docs
        run: cd docs && bun run build
